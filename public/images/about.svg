<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" role="img" aria-label="Luthier trabalhando na bancada">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#241b13"/>
      <stop offset="1" stop-color="#48331f"/>
    </linearGradient>
  </defs>
  <rect width="600" height="520" fill="url(#abg)"/>

  <!-- bancada -->
  <rect x="0" y="380" width="600" height="140" fill="#1d150e"/>
  <rect x="0" y="372" width="600" height="14" fill="#6b471f"/>

  <!-- ferramentas penduradas -->
  <g stroke="#caa56e" stroke-opacity="0.5" stroke-width="3" fill="none">
    <line x1="120" y1="40" x2="120" y2="110"/>
    <path d="M108 110h24v26h-24z"/>
    <line x1="180" y1="40" x2="180" y2="96"/>
    <circle cx="180" cy="112" r="16"/>
    <line x1="240" y1="40" x2="240" y2="120"/>
    <path d="M232 120l8 18 8-18z"/>
  </g>

  <!-- braço de guitarra sobre a bancada -->
  <g transform="rotate(-8 300 320)">
    <rect x="120" y="300" width="360" height="46" rx="8" fill="#8a572b" stroke="#f3dcb0" stroke-opacity="0.2" stroke-width="2"/>
    <g stroke="#241910" stroke-width="2">
      <line x1="150" y1="300" x2="150" y2="346"/>
      <line x1="195" y1="300" x2="195" y2="346"/>
      <line x1="240" y1="300" x2="240" y2="346"/>
      <line x1="285" y1="300" x2="285" y2="346"/>
      <line x1="330" y1="300" x2="330" y2="346"/>
      <line x1="375" y1="300" x2="375" y2="346"/>
      <line x1="420" y1="300" x2="420" y2="346"/>
    </g>
    <g fill="#e8d6b4">
      <circle cx="172" cy="323" r="3"/>
      <circle cx="262" cy="323" r="3"/>
      <circle cx="352" cy="323" r="3"/>
    </g>
  </g>
</svg>
